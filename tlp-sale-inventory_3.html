  :root {
    --paper:        #FDFDFB;
    --paper-deep:   #F5F5F2;
    --paper-darker: #EDEDE8;
    --ink:          #0F0F0F;
    --ink-soft:     #5C5C5A;
    --ink-whisper:  #9C9C98;
    --mustard:      #E3A81B;
    --cereza:       #C41E3A;
    --display: 'PP Hatton', Georgia, serif;
    --sans:    'Geist', system-ui, -apple-system, sans-serif;
    --mono:    'Geist Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper); color: var(--ink);
    font-family: var(--sans); font-size: 13.5px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-variant-numeric: lining-nums tabular-nums;
    min-height: 100vh;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

  /* HEADER */
  .site-header { padding: 24px clamp(18px, 4vw, 44px) 20px; border-bottom: 2px solid var(--ink); }
  .site-header-inner {
    max-width: 1600px; margin: 0 auto;
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 20px; flex-wrap: wrap;
  }
  .brand { font-family: var(--display); font-weight: 600; font-size: 40px; letter-spacing: -0.025em; line-height: 0.9; }
  .brand .italic { font-style: italic; font-weight: 500; }
  .brand-sub {
    display: block; font-family: var(--mono);
    font-size: 10px; font-weight: 500; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--ink-soft); margin-top: 5px;
  }
  .header-actions { display: flex; gap: 6px; align-items: center; position: relative; flex-wrap: wrap; }
  .icon-btn {
    padding: 9px 15px; font-family: var(--mono);
    font-size: 10px; font-weight: 500; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink);
    border: 1px solid var(--ink); background: transparent;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--ink); color: var(--paper); }
  .icon-btn.primary { background: var(--mustard); border-color: var(--ink); }
  .icon-btn.primary:hover { background: var(--ink); color: var(--mustard); }

  .sync-indicator {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; font-family: var(--mono);
    font-size: 9px; font-weight: 500; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ink-soft);
    border: 1px solid var(--paper-darker); background: var(--paper);
  }
  .sync-indicator::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-whisper); display: inline-block;
  }
  .sync-indicator.synced { color: var(--ink); }
  .sync-indicator.synced::before { background: var(--mustard); }
  .sync-indicator.syncing { color: var(--ink-soft); }
  .sync-indicator.syncing::before { background: var(--ink-soft); animation: pulse 1s ease-in-out infinite; }
  .sync-indicator.error { color: var(--cereza); border-color: var(--cereza); }
  .sync-indicator.error::before { background: var(--cereza); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* VIEW TOGGLE */
  .view-tabs {
    display: flex; padding: 0 clamp(18px, 4vw, 44px);
    border-bottom: 1px solid var(--ink); background: var(--paper);
  }
  .view-tabs-inner { max-width: 1600px; margin: 0 auto; width: 100%; display: flex; gap: 0; }
  .view-tab {
    padding: 20px 0; margin-right: 36px;
    font-family: var(--display); font-weight: 500;
    font-size: 20px; letter-spacing: -0.015em;
    color: var(--ink-whisper); line-height: 1;
    display: flex; align-items: baseline; gap: 8px;
    position: relative;
  }
  .view-tab:hover { color: var(--ink-soft); }
  .view-tab.active { color: var(--ink); font-weight: 600; }
  .view-tab.active::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
    height: 3px; background: var(--mustard);
  }
  .view-tab-icon {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-whisper);
  }
  .view-tab.active .view-tab-icon { color: var(--mustard); }

  /* TITLE BAND */
  .title-band { padding: 18px clamp(18px, 4vw, 44px); border-bottom: 1px solid var(--ink); }
  .title-band-inner {
    max-width: 1600px; margin: 0 auto;
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 20px; flex-wrap: wrap;
  }
  .title-band-main {
    font-family: var(--display); font-weight: 500; font-style: italic;
    font-size: 24px; letter-spacing: -0.015em; line-height: 1;
  }
  .title-band-main .serif { font-weight: 600; font-style: normal; }
  .title-stats { display: flex; gap: 26px; font-family: var(--mono); font-size: 9.5px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); }
  .title-stat strong {
    display: block; font-family: var(--display); font-weight: 500;
    font-size: 22px; color: var(--ink); line-height: 1;
    letter-spacing: -0.02em; margin-bottom: 3px; font-style: italic;
  }

  main { max-width: 1600px; margin: 0 auto; padding: 20px clamp(18px, 4vw, 44px) 80px; }

  /* ═════════ SCAN MODE ═════════ */
  .scan-view {
    max-width: 560px; margin: 0 auto;
  }
  .scan-hero {
    background: var(--ink);
    color: var(--paper);
    padding: 40px 24px;
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .scan-hero h2 {
    font-family: var(--display);
    font-weight: 500;
    font-style: italic;
    font-size: 28px;
    letter-spacing: -0.015em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .scan-hero p {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-whisper);
  }

  .scan-start-btn {
    display: block;
    width: 100%;
    background: var(--mustard);
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 24px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: all 0.15s;
    margin-bottom: 24px;
    cursor: pointer;
  }
  .scan-start-btn:hover { background: var(--ink); color: var(--mustard); }

  .scan-camera-wrap {
    position: relative;
    background: var(--ink);
    aspect-ratio: 4 / 3;
    margin-bottom: 16px;
    overflow: hidden;
  }
  #scanVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .scan-overlay {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    pointer-events: none;
  }
  .scan-reticle {
    position: absolute;
    top: 50%; left: 10%; right: 10%;
    height: 2px;
    background: var(--cereza);
    transform: translateY(-50%);
    box-shadow: 0 0 8px var(--cereza);
    animation: reticleScan 2s ease-in-out infinite;
  }
  @keyframes reticleScan {
    0%, 100% { top: 30%; }
    50% { top: 70%; }
  }
  .scan-hint {
    background: rgba(15,15,15,0.85);
    color: var(--paper);
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
  }

<input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv">
<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';

  // ═══════════════════════════════════════════════
  // SUPABASE CONFIG
  // ═══════════════════════════════════════════════
  const SUPABASE_CONFIG = {
    url: 'https://hbzboxshglcnfrbnfiep.supabase.co',
    key: 'sb_publishable_zvjGW5ugngA0LRkH2ZQyKw_AC1aETkZ'
  };
  const SB_REST = `${SUPABASE_CONFIG.url}/rest/v1`;
  const SB_HEADERS = {
    'apikey': SUPABASE_CONFIG.key,
    'Authorization': `Bearer ${SUPABASE_CONFIG.key}`
  };

  // ═══════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════
  let state = {
    view: 'admin',  // 'scan' | 'admin'
    skus: {},       // id -> SKU
    recentScans: [],
    editingId: null,
    filter: { ref: '', size: '', search: '' },
    scanner: null,
    currentScanSku: null,
    lastSyncAt: null
  };

  const $ = id => document.getElementById(id);
  function esc(s) {
    if (s === undefined || s === null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function n(v) { const x = parseFloat(v); return isNaN(x) ? 0 : x; }
  function genId() { return 'k_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7); }
  function currentMonthKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}`;
  }

  // ═══════════════════════════════════════════════
  // SYNC INDICATOR
  // ═══════════════════════════════════════════════
  function setSyncStatus(status, label) {
    const el = $('syncIndicator');
    if (!el) return;
    el.classList.remove('syncing', 'synced', 'error');
    if (status) el.classList.add(status);
    if (label) el.textContent = label;
  }
  function syncedLabel() {
    if (!state.lastSyncAt) return 'Synced';
    const t = state.lastSyncAt;
    return `Synced · ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  }

  // ═══════════════════════════════════════════════
  // DATA CONVERSION
  // ═══════════════════════════════════════════════
  function dbToApp(row) {
    return {
      id: row.id,
      reference: row.reference || '',
      name: row.name || '',
      color: row.color || '',
      upc: row.upc || '',
      size: (row.size || '').trim(),
      qtyNj: Number(row.qty_nj) || 0,
      qtyNordstrom: Number(row.qty_nordstrom) || 0,
      qtyReturns: Number(row.qty_returns) || 0,
      cost: row.cost !== null ? Number(row.cost) : '',
      listingPrice: row.listing_price !== null ? Number(row.listing_price) : '',
      totalReceived: Number(row.total_received) || 0,
      soldByMonth: row.sold_by_month || {},
      soldDtcByMonth: row.sold_dtc_by_month || {},
      soldNordstromByMonth: row.sold_nordstrom_by_month || {},
      giftedByMonth: row.gifted_by_month || {},
      notes: row.notes || '',
      updatedAt: row.updated_at ? new Date(row.updated_at).getTime() : Date.now()
    };
  }
  function appToDb(sku) {
    return {
      id: sku.id,
      reference: sku.reference || null,
      name: sku.name || null,
      color: sku.color || null,
      upc: sku.upc || null,
      size: sku.size || null,
      qty_nj: Number(sku.qtyNj) || 0,
      qty_nordstrom: Number(sku.qtyNordstrom) || 0,
      qty_returns: Number(sku.qtyReturns) || 0,
      cost: sku.cost === '' || sku.cost === null ? null : Number(sku.cost),
      listing_price: sku.listingPrice === '' || sku.listingPrice === null ? null : Number(sku.listingPrice),
      total_received: Number(sku.totalReceived) || 0,
      sold_by_month: sku.soldByMonth || {},
      sold_dtc_by_month: sku.soldDtcByMonth || {},
      sold_nordstrom_by_month: sku.soldNordstromByMonth || {},
      gifted_by_month: sku.giftedByMonth || {},
      notes: sku.notes || null,
      updated_at: new Date().toISOString()
    };
  }

  // ═══════════════════════════════════════════════
  // SUPABASE LOAD / SAVE
  // ═══════════════════════════════════════════════
  async function loadAll() {
    setSyncStatus('syncing', 'Loading');
    try {
      const res = await fetch(`${SB_REST}/skus?select=*`, { headers: SB_HEADERS });
      if (!res.ok) throw new Error('Load failed: ' + res.status);
      const rows = await res.json();
      state.skus = {};
      for (const row of rows) {
        const sku = dbToApp(row);
        state.skus[sku.id] = sku;
      }
      state.lastSyncAt = new Date();
      setSyncStatus('synced', syncedLabel());
    } catch (err) {
      console.error('Load failed', err);
      setSyncStatus('error', 'Offline');
    }
  }

  async function saveSku(sku) {
    setSyncStatus('syncing', 'Saving');
    try {
      const res = await fetch(`${SB_REST}/skus`, {
        method: 'POST',
        headers: { ...SB_HEADERS, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify(appToDb(sku))
      });
      if (!res.ok) { const err = await res.text(); console.error('Save failed', res.status, err); throw new Error('Save failed'); }
      state.lastSyncAt = new Date();
      setSyncStatus('synced', syncedLabel());
    } catch (err) {
      console.error('saveSku error', err);
      setSyncStatus('error', 'Save failed');
      throw err;
    }
  }

  async function saveManySkus(skus) {
    if (!skus.length) return;
    setSyncStatus('syncing', `Saving ${skus.length}…`);
    try {
      // Supabase handles bulk upsert if we POST an array
      const res = await fetch(`${SB_REST}/skus`, {
        method: 'POST',
        headers: { ...SB_HEADERS, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify(skus.map(appToDb))
      });
      if (!res.ok) { console.error('Bulk save failed', res.status, await res.text()); throw new Error('Bulk save failed'); }
      state.lastSyncAt = new Date();
      setSyncStatus('synced', syncedLabel());
    } catch (err) {
      console.error('saveManySkus error', err);
      setSyncStatus('error', 'Save failed');
      throw err;
    }
  }

  async function deleteSku(id) {
    setSyncStatus('syncing', 'Deleting');
    try {
      const res = await fetch(`${SB_REST}/skus?id=eq.${encodeURIComponent(id)}`, { method: 'DELETE', headers: SB_HEADERS });
      if (!res.ok) throw new Error('Delete failed');
      state.lastSyncAt = new Date();
      setSyncStatus('synced', syncedLabel());
    } catch (err) {
      console.error('Delete error', err);
      setSyncStatus('error', 'Delete failed');
    }
  }

  async function logScanEvent(event) {
    try {
      await fetch(`${SB_REST}/scan_events`, {
        method: 'POST',
        headers: { ...SB_HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ id: 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,6), ...event })
      });
    } catch(e) { /* non-critical, don't block UI */ }
  }

  // Polling sync
  function startPolling() {
    setInterval(async () => {
      if ($('editBackdrop')?.classList.contains('open')) return;
      try {
        const res = await fetch(`${SB_REST}/skus?select=*`, { headers: SB_HEADERS });
        if (!res.ok) return;
        const rows = await res.json();
        const incoming = {};
        for (const row of rows) { const sku = dbToApp(row); incoming[sku.id] = sku; }
        const currentIds = Object.keys(state.skus).sort().join(',');
        const incomingIds = Object.keys(incoming).sort().join(',');
        const currentStamp = Object.values(state.skus).reduce((s, k) => s + (k.updatedAt || 0), 0);
        const incomingStamp = Object.values(incoming).reduce((s, k) => s + (k.updatedAt || 0), 0);
        if (currentIds !== incomingIds || currentStamp !== incomingStamp) {
          state.skus = incoming;
          render();
          state.lastSyncAt = new Date();
          setSyncStatus('synced', syncedLabel());
        }
      } catch(e) { /* silent */ }
    }, 30000);
  }

  // ═══════════════════════════════════════════════
  // EXCEL IMPORT
  // ═══════════════════════════════════════════════
  function findHeaderRow(rows) {
    for (let i = 0; i < Math.min(rows.length, 25); i++) {
      const row = rows[i].map(c => String(c || '').toLowerCase());
      if (row.some(c => /referencia|reference/i.test(c)) &&
          row.some(c => /codigo|upc|code/i.test(c)) &&
          row.some(c => /talla|size/i.test(c))) {
        return i;
      }
    }
    return -1;
  }

  function matchColumn(header) {
    const h = String(header || '').trim().toLowerCase();
    if (!h) return null;
    if (/^referencia$|^reference$/i.test(h)) return 'reference';
    if (/^nombre$|^name$/i.test(h)) return 'name';
    if (/color/i.test(h) || /estampado/i.test(h) || /print/i.test(h)) return 'color';
    if (/codigo|c[oó]digo|upc|barcode/i.test(h)) return 'upc';
    if (/^talla$|^size$/i.test(h)) return 'size';
    if (/cantidad\s*f[ií]sica|fisica|nj|physical|en\s*nj/i.test(h)) return 'qtyNj';
    if (/cargada|nordstrom|allocated/i.test(h)) return 'qtyNordstrom';
    if (/return|devoluc/i.test(h)) return 'qtyReturns';
    if (/^cost$|^costo$/i.test(h)) return 'cost';
    if (/listing|listing\s*price|retail|pvp/i.test(h)) return 'listingPrice';
    if (/observaciones?|notes?|comment/i.test(h)) return 'notes';
    return null;
  }

  async function handleExcelFile(file) {
    try {
      const data = new Uint8Array(await file.arrayBuffer());
      const wb = XLSX.read(data, { type: 'array' });
      const sheetName = wb.SheetNames[0];  // use first sheet
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
      const headerIdx = findHeaderRow(rows);

      if (headerIdx < 0) {
        toast('Could not find header row — need columns REFERENCIA, CODIGO, TALLA', 'error');
        return;
      }

      const headers = rows[headerIdx].map(h => String(h || '').trim());
      const mapping = headers.map(h => ({ header: h, key: matchColumn(h) }));
      const dataRows = rows.slice(headerIdx + 1).filter(r => r.some(c => c !== null && c !== ''));

      // Stop at a "TOTAL" row
      const cleanRows = [];
      for (const r of dataRows) {
        const first = String(r[1] || r[0] || '').toLowerCase();
        if (first.includes('total')) break;
        cleanRows.push(r);
      }

      if (!cleanRows.length) { toast('No data rows found', 'error'); return; }

      if (!confirm(`Import ${cleanRows.length} SKUs? Matching SKUs (by UPC) will be updated; new ones will be added.\n\nExisting monthly sales history is preserved.`)) return;

      // Index existing by UPC
      const byUpc = {};
      for (const s of Object.values(state.skus)) if (s.upc) byUpc[s.upc] = s;

      const monthKey = currentMonthKey();
      const toSave = [];
      let added = 0, updated = 0;

      for (const row of cleanRows) {
        const parsed = {};
        mapping.forEach((m, i) => {
          if (!m.key) return;
          const v = row[i];
          if (v === null || v === undefined || v === '') return;
          if (['qtyNj','qtyNordstrom','qtyReturns','cost','listingPrice'].includes(m.key)) parsed[m.key] = n(v);
          else parsed[m.key] = String(v).trim();
        });
        if (!parsed.upc && !parsed.reference) continue;

        const existing = parsed.upc && byUpc[parsed.upc];
        let sku;
        if (existing) {
          sku = { ...existing };
          // Track received: if qtyNj increased, count that as new stock received
          const deltaNj = (parsed.qtyNj ?? existing.qtyNj) - existing.qtyNj;
          if (deltaNj > 0) {
            sku.totalReceived = (Number(existing.totalReceived) || 0) + deltaNj;
          }
          sku.reference = parsed.reference ?? existing.reference;
          sku.name = parsed.name ?? existing.name;
          sku.color = parsed.color ?? existing.color;
          sku.size = parsed.size ?? existing.size;
          if (parsed.qtyNj !== undefined) sku.qtyNj = parsed.qtyNj;
          if (parsed.qtyNordstrom !== undefined) sku.qtyNordstrom = parsed.qtyNordstrom;
          if (parsed.qtyReturns !== undefined) sku.qtyReturns = parsed.qtyReturns;
          if (parsed.cost !== undefined) sku.cost = parsed.cost;
          if (parsed.listingPrice !== undefined) sku.listingPrice = parsed.listingPrice;
          if (parsed.notes !== undefined) sku.notes = parsed.notes;
          updated++;
        } else {
          // Only qtyNj counts as physical received. Nordstrom is virtual allocation.
          sku = {
            id: genId(),
            reference: parsed.reference || '',
            name: parsed.name || '',
            color: parsed.color || '',
            upc: parsed.upc || '',
            size: parsed.size || '',
            qtyNj: n(parsed.qtyNj),
            qtyNordstrom: n(parsed.qtyNordstrom),
            qtyReturns: n(parsed.qtyReturns),
            cost: parsed.cost ?? '',
            listingPrice: parsed.listingPrice ?? '',
            totalReceived: n(parsed.qtyNj),
            soldByMonth: {},
            notes: parsed.notes || ''
          };
          added++;
        }
        state.skus[sku.id] = sku;
        toSave.push(sku);
      }

      await saveManySkus(toSave);
      render();
      toast(`Imported · ${added} added · ${updated} updated`, 'success');
    } catch(err) {
      console.error('Import error', err);
      toast('Import failed — check console', 'error');
    }
  }

  // ═══════════════════════════════════════════════
  // EXCEL EXPORT
  // ═══════════════════════════════════════════════
  function exportExcel() {
    if (typeof XLSX === 'undefined') { toast('Excel library still loading', 'error'); return; }
    const datestamp = new Date().toISOString().slice(0,10);

    const skus = Object.values(state.skus).sort((a,b) => (a.reference||'').localeCompare(b.reference||'') || (a.size||'').localeCompare(b.size||''));

    // Sheet 1: Team's format (matches the NJ warehouse Excel)
    const teamRows = [
      ['INVENTARIO TOTAL WAREHOUSE - NJ - THE LULO PROJECT'],
      [],
      [`FECHA: ${datestamp}`],
      [],
      ['REFERENCIA','NOMBRE','COLOR / ESTAMPADO','CODIGO','TALLA','CANTIDAD FISICA EN NJ','CANTIDAD CARGADA EN NORDSTROM','RETURNS','COST','LISTING PRICE','OBSERVACIONES']
    ];
    let totalNj = 0, totalNord = 0, totalReturns = 0;
    for (const s of skus) {
      teamRows.push([s.reference, s.name, s.color, s.upc, s.size, s.qtyNj, s.qtyNordstrom, s.qtyReturns, s.cost, s.listingPrice, s.notes]);
      totalNj += n(s.qtyNj); totalNord += n(s.qtyNordstrom); totalReturns += n(s.qtyReturns);
    }
    teamRows.push([]);
    teamRows.push(['TOTAL UNIDADES', null, null, null, null, totalNj, totalNord, totalReturns]);

    // Sheet 2: With sell-through + monthly sales (admin detail)
    const monthKeys = new Set();
    for (const s of skus) {
      for (const k of Object.keys(s.soldByMonth || {})) monthKeys.add(k);
      for (const k of Object.keys(s.giftedByMonth || {})) monthKeys.add(k);
    }
    const months = [...monthKeys].sort();
    const adminHeader = ['REFERENCIA','NOMBRE','COLOR','CODIGO','TALLA','NJ','NORDSTROM','TOTAL RECEIVED','TOTAL SOLD','TOTAL GIFTED','SELL-THROUGH %','COST','LISTING PRICE'];
    for (const m of months) {
      adminHeader.push(`${m} sold DTC`, `${m} sold Nord`, `${m} gifted`);
    }
    const adminRows = [adminHeader];
    for (const s of skus) {
      const totalRec = Number(s.totalReceived) || 0;
      const totalSold = Object.values(s.soldByMonth || {}).reduce((a,b) => a + n(b), 0);
      const totalGift = Object.values(s.giftedByMonth || {}).reduce((a,b) => a + n(b), 0);
      const st = totalRec > 0 ? (totalSold / totalRec) * 100 : 0;
      const monthCols = [];
      for (const m of months) {
        monthCols.push(
          n(s.soldDtcByMonth?.[m]) || 0,
          n(s.soldNordstromByMonth?.[m]) || 0,
          n(s.giftedByMonth?.[m]) || 0
        );
      }
      adminRows.push([s.reference, s.name, s.color, s.upc, s.size, s.qtyNj, s.qtyNordstrom, totalRec, totalSold, totalGift, Math.round(st) + '%', s.cost, s.listingPrice, ...monthCols]);
    }

    // Sheet 3: By style (aggregated)
    const styleAgg = {};
    for (const s of skus) {
      const k = s.reference + '|' + s.name;
      if (!styleAgg[k]) styleAgg[k] = { reference: s.reference, name: s.name, received: 0, sold: 0, nj: 0, nordstrom: 0, returns: 0 };
      styleAgg[k].received += Number(s.totalReceived) || 0;
      styleAgg[k].sold += Object.values(s.soldByMonth || {}).reduce((a,b) => a + n(b), 0);
      styleAgg[k].nj += n(s.qtyNj);
      styleAgg[k].nordstrom += n(s.qtyNordstrom);
      styleAgg[k].returns += n(s.qtyReturns);
    }
    const styleRows = [['REFERENCIA','NOMBRE','TOTAL RECEIVED','TOTAL SOLD','SELL-THROUGH %','NJ','NORDSTROM','RETURNS']];
    for (const v of Object.values(styleAgg)) {
      const st = v.received > 0 ? (v.sold / v.received) * 100 : 0;
      styleRows.push([v.reference, v.name, v.received, v.sold, Math.round(st) + '%', v.nj, v.nordstrom, v.returns]);
    }

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(teamRows), 'Team Format');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(adminRows), 'Admin Detail');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(styleRows), 'By Style');

    XLSX.writeFile(wb, `TLP-sale-inventory-${datestamp}.xlsx`);
    toast('Excel downloaded', 'success');
  }

  // ═══════════════════════════════════════════════
  // RENDER — STATS
  // ═══════════════════════════════════════════════
  function updateStats() {
    const all = Object.values(state.skus);
    let nj = 0, nord = 0, soldMonth = 0, giftedMonth = 0;
    let totalReceivedAll = 0, totalSoldAll = 0;
    const monthKey = currentMonthKey();
    for (const s of all) {
      nj += n(s.qtyNj);
      nord += n(s.qtyNordstrom);
      soldMonth += n(s.soldByMonth?.[monthKey] || 0);
      giftedMonth += n(s.giftedByMonth?.[monthKey] || 0);
      totalReceivedAll += Number(s.totalReceived) || 0;
      totalSoldAll += Object.values(s.soldByMonth || {}).reduce((a,b) => a + n(b), 0);
    }
    const overallSt = totalReceivedAll > 0 ? Math.round((totalSoldAll / totalReceivedAll) * 100) : 0;

    $('statSkus').textContent = String(all.length).padStart(2, '0');
    $('statNj').textContent = nj.toLocaleString();
    $('statNordstrom').textContent = nord.toLocaleString();
    $('statSoldThisMonth').textContent = soldMonth.toLocaleString();
    $('statGiftedThisMonth').textContent = giftedMonth.toLocaleString();
    $('statSellThrough').textContent = totalReceivedAll > 0 ? overallSt + '%' : '—';
    const totalSoldEl = $('statTotalSold');
    if (totalSoldEl) totalSoldEl.textContent = totalSoldAll.toLocaleString();
    const totalRecEl = $('statTotalReceived');
    if (totalRecEl) totalRecEl.textContent = totalReceivedAll.toLocaleString();
    $('skuCountTab').textContent = String(all.length).padStart(2, '0');
  }

  function render() {

  // SCAN VIEW
  // ═══════════════════════════════════════════════

    const main = $('main');
    const hasScanner = typeof ZXingBrowser !== 'undefined';

          `}

          <div class="scan-manual-input">

            <button id="manualUpcBtn">Go</button>
          </div>
        </div>

        ${state.recentScans.length ? `
        <div class="scan-recent">

            <div class="scan-recent-row">

      const upc = $('manualUpcInput').value.trim();
      if (upc) handleUpcScan(upc);
    });
    $('manualUpcInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const upc = e.target.value.trim();
        if (upc) handleUpcScan(upc);
      }

  async function startScanner() {
    if (typeof ZXingBrowser === 'undefined') {
      toast('Scanner library not loaded', 'error');
      return;
    }
    const scanArea = $('scanArea');
    scanArea.innerHTML = `
      <div class="scan-camera-wrap">
        <video id="scanVideo" autoplay playsinline muted></video>
        <div class="scan-overlay">
          <button class="scan-close-btn" id="scanCloseBtn" aria-label="Close scanner">×</button>
          <div class="scan-reticle"></div>
          <div class="scan-hint">Center the barcode in view</div>
        </div>
      </div>
    `;
    $('scanCloseBtn').addEventListener('click', stopScanner);

    try {
      const reader = new ZXingBrowser.BrowserMultiFormatReader();
      state.scanner = reader;
      const videoEl = $('scanVideo');
      await reader.decodeFromVideoDevice(undefined, videoEl, (result, err) => {
        if (result) {
          const upc = result.getText();
          stopScanner();
          handleUpcScan(upc);
        }
      });
    } catch (err) {
      console.error('Scanner error', err);
      toast('Camera access denied or unavailable', 'error');
      renderScanView();
    }
  }

  function stopScanner() {
    if (state.scanner) {
      try { state.scanner.reset(); } catch(e){}
      state.scanner = null;
    }
  }

  function handleUpcScan(upc) {
    const trimmed = String(upc).trim();
    const match = Object.values(state.skus).find(s => (s.upc || '').trim() === trimmed);
    if (!match) {
      renderScanNotFound(trimmed);
      return;
    }
    state.currentScanSku = match.id;
    renderScanResult(match);
  }

    main.innerHTML = `

  async function applyScanAction(skuId, action) {
    const sku = state.skus[skuId];
    if (!sku) return;
    const monthKey = currentMonthKey();

    let deltaNj = 0;
    let readableAction = '';

    if (action === 'received') {
      sku.qtyNj = n(sku.qtyNj) + 1;
      sku.totalReceived = n(sku.totalReceived) + 1;
      deltaNj = 1;
      readableAction = 'SHIP IN';
    } else if (action === 'ship_out') {
      if (n(sku.qtyNj) <= 0) { toast('No stock in NJ', 'error'); return; }
      sku.qtyNj = n(sku.qtyNj) - 1;
      deltaNj = -1;
      readableAction = 'SHIP OUT';
    }

    try {
      await saveSku(sku);
      logScanEvent({ sku_id: sku.id, upc: sku.upc, action, delta_nj: deltaNj, delta_nordstrom: 0, delta_returns: 0, delta_sold: 0 });

      // Record in recent scans
      state.recentScans.unshift({
        name: sku.name, color: sku.color, size: sku.size,
        action: readableAction,
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      });
      state.recentScans = state.recentScans.slice(0, 20);

      toast(`${readableAction} · ${sku.name} ${sku.size}`, 'success');
      renderScanResult(sku);
    } catch(e) {
      toast('Save failed — check connection', 'error');
    }
  }

  // ═══════════════════════════════════════════════
  // ADMIN VIEW
  // ═══════════════════════════════════════════════
  function filteredSkus() {
    let items = Object.values(state.skus);
    const f = state.filter;
    if (f.ref) items = items.filter(s => s.reference === f.ref);
    if (f.size) items = items.filter(s => (s.size || '').trim().toUpperCase() === f.size);
    if (f.search) {
      const q = f.search.toLowerCase();
      items = items.filter(s =>
        (s.reference||'').toLowerCase().includes(q) ||
        (s.name||'').toLowerCase().includes(q) ||
        (s.color||'').toLowerCase().includes(q) ||
        (s.upc||'').toLowerCase().includes(q) ||
        (s.notes||'').toLowerCase().includes(q)
      );
    }
    return items;
  }

  function renderAdminView() {
    const main = $('main');
    const all = Object.values(state.skus);

    if (all.length === 0) {
      main.innerHTML = `
        <div class="empty">
          <div class="empty-mark">L</div>
          <div class="empty-title">No inventory yet.</div>

      $('emptyAddBtn').addEventListener('click', () => openEditModal(null));
      return;
    }

    const items = filteredSkus();
    const referenceOptions = [...new Set(all.map(s => s.reference).filter(Boolean))].sort();
    const sizeOptions = [...new Set(all.map(s => (s.size||'').trim().toUpperCase()).filter(Boolean))].sort((a,b) => {
      const order = ['XS','S','M','L','XL','XXL','XXXL'];
      const ai = order.indexOf(a), bi = order.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });

    // Sort: by reference, then size order
    const sizeOrder = ['XS','S','M','L','XL','XXL','XXXL'];
    items.sort((a,b) => {
      const ra = (a.reference||'').localeCompare(b.reference||'');
      if (ra) return ra;
      const ca = (a.color||'').localeCompare(b.color||'');
      if (ca) return ca;
      const ai = sizeOrder.indexOf((a.size||'').trim().toUpperCase());
      const bi = sizeOrder.indexOf((b.size||'').trim().toUpperCase());
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });

    // Collect month keys
    const monthKeys = new Set();
    for (const s of items) {
      for (const k of Object.keys(s.soldByMonth || {})) monthKeys.add(k);
    }
    const months = [...monthKeys].sort();

    // Group by reference for style headers; render one row per SKU (size)
    const rowsHtml = [];
    let currentRef = null;
    for (const sku of items) {
      if (sku.reference !== currentRef) {
        currentRef = sku.reference;
        // Compute style-level aggregates
        const styleSkus = items.filter(s => s.reference === currentRef);
        const styleRec = styleSkus.reduce((a, s) => a + (Number(s.totalReceived) || 0), 0);
        const styleSold = styleSkus.reduce((a, s) => a + Object.values(s.soldByMonth||{}).reduce((x,y) => x + n(y), 0), 0);
        const styleSt = styleRec > 0 ? Math.round((styleSold / styleRec) * 100) : 0;
        const colCount = 11 + months.length + 1;
        rowsHtml.push(`
          <tr class="style-header-row">
            <td colspan="5">${esc(currentRef)} · ${esc(styleSkus[0].name)}</td>
            <td colspan="${colCount - 5}" class="st-summary">
              Received ${styleRec} · Sold ${styleSold} · Sell-through <strong>${styleSt}%</strong>
            </td>
          </tr>
        `);
      }
      rowsHtml.push(renderAdminRow(sku, months));
    }

    const monthCols = months.map(m => `<th class="num month-col">${esc(m)} sold</th>`).join('');

    main.innerHTML = `
      <div class="admin-view">
        <div class="toolbar">
          <span class="toolbar-label">Filter</span>
          <select class="select" id="filterRef">
            <option value="">All styles</option>
            ${referenceOptions.map(r => `<option value="${esc(r)}" ${state.filter.ref===r?'selected':''}>${esc(r)}</option>`).join('')}
          </select>
          <select class="select" id="filterSize">
            <option value="">All sizes</option>
            ${sizeOptions.map(s => `<option value="${esc(s)}" ${state.filter.size===s?'selected':''}>${esc(s)}</option>`).join('')}
          </select>
          <input type="text" class="search-input" id="searchInput" placeholder="Search — ref, name, UPC, color…" value="${esc(state.filter.search)}">
          <div class="toolbar-spacer"></div>
          <button class="icon-btn" id="addSkuBtn">+ Add SKU</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ref</th>
                <th>Name</th>
                <th>Color</th>
                <th>UPC</th>
                <th class="center">Size</th>
                <th class="num">NJ</th>
                <th class="num">Nord.</th>
                <th class="num">Gift</th>
                <th class="num">Cost</th>
                <th class="num">Retail</th>
                ${monthCols}
                <th class="num">Sell-thru</th>
                <th class="center" style="width:140px;"></th>
              </tr>
            </thead>
            <tbody>
              ${rowsHtml.join('')}
            </tbody>
          </table>
        </div>

    `;

    $('filterRef').addEventListener('change', e => { state.filter.ref = e.target.value; render(); });
    $('filterSize').addEventListener('change', e => { state.filter.size = e.target.value; render(); });
    $('searchInput').addEventListener('input', e => { state.filter.search = e.target.value; render(); });
    $('addSkuBtn').addEventListener('click', () => openEditModal(null));
    main.querySelectorAll('[data-edit-id]').forEach(btn => btn.addEventListener('click', () => openEditModal(btn.dataset.editId)));
    main.querySelectorAll('[data-del-id]').forEach(btn => btn.addEventListener('click', () => confirmDelete(btn.dataset.delId)));
    main.querySelectorAll('[data-sale-id]').forEach(btn => btn.addEventListener('click', () => openSaleModal(btn.dataset.saleId)));
    main.querySelectorAll('[data-group-sale]').forEach(btn => btn.addEventListener('click', () => openGroupSaleModal(btn.dataset.groupSale)));
    main.querySelectorAll('[data-group-edit]').forEach(btn => btn.addEventListener('click', () => openGroupEditModal(btn.dataset.groupEdit)));
  }

  // ═══════════════════════════════════════════════
  // GROUP-LEVEL MODALS (for color-aggregated rows)
  // ═══════════════════════════════════════════════
  async function openGroupSaleModal(groupKey) {
    const [ref, color] = groupKey.split('||');
    const skus = Object.values(state.skus).filter(s => s.reference === ref && s.color === color);
    if (!skus.length) { toast('SKUs not found', 'error'); return; }

    // Sort sizes in standard order
    const sizeOrder = ['XS','S','M','L','XL','XXL','XXXL'];
    skus.sort((a,b) => {
      const ai = sizeOrder.indexOf((a.size||'').trim().toUpperCase());
      const bi = sizeOrder.indexOf((b.size||'').trim().toUpperCase());
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });

    // Step 1: Ask for size
    const sizeList = skus.map(s => (s.size||'').trim().toUpperCase()).join(' / ');
    const sizeInput = window.prompt(
      `${skus[0].name} · ${color}\n\nWhich size sold?\nAvailable: ${sizeList}\n\nType the size (e.g. S, M, L):`,
      ''
    );
    if (!sizeInput) return;
    const targetSize = sizeInput.trim().toUpperCase();
    const targetSku = skus.find(s => (s.size||'').trim().toUpperCase() === targetSize);
    if (!targetSku) {
      toast(`Size "${targetSize}" not found for this color`, 'error');
      return;
    }

    // Step 2: Ask for channel
    const channelInput = window.prompt(
      `Record for:\n${targetSku.name} · ${targetSku.color} · ${targetSku.size}\nCurrent NJ: ${n(targetSku.qtyNj)}\n\nType: D (DTC) · N (Nordstrom) · G (Gift / PR)`,
      'D'
    );
    if (!channelInput) return;
    const c = channelInput.trim().toUpperCase();
    const validChoices = ['D','DTC','N','NORDSTROM','G','GIFT','PR'];
    if (!validChoices.includes(c)) {
      toast('Invalid choice — type D, N, or G', 'error');
      return;
    }

    // Record the sale (or gift)
    const monthKey = currentMonthKey();

    if (c === 'G' || c === 'GIFT' || c === 'PR') {
      // GIFT — does NOT count as a sale. Tracked separately.
      targetSku.giftedByMonth = { ...(targetSku.giftedByMonth || {}) };
      targetSku.giftedByMonth[monthKey] = (targetSku.giftedByMonth[monthKey] || 0) + 1;
    } else {
      // SALE (DTC or Nordstrom)
      targetSku.soldByMonth = { ...(targetSku.soldByMonth || {}) };
      targetSku.soldByMonth[monthKey] = (targetSku.soldByMonth[monthKey] || 0) + 1;

      if (c === 'D' || c === 'DTC') {
        targetSku.soldDtcByMonth = { ...(targetSku.soldDtcByMonth || {}) };
        targetSku.soldDtcByMonth[monthKey] = (targetSku.soldDtcByMonth[monthKey] || 0) + 1;
      } else {
        targetSku.soldNordstromByMonth = { ...(targetSku.soldNordstromByMonth || {}) };
        targetSku.soldNordstromByMonth[monthKey] = (targetSku.soldNordstromByMonth[monthKey] || 0) + 1;
      }
    }

    // Note: we do NOT touch qtyNj here. The warehouse assistant will scan
    // SHIP OUT when the unit physically leaves, which decrements NJ.

    try {
      await saveSku(targetSku);
      let label = 'DTC';
      let kind = 'Sale';
      if (c === 'N' || c === 'NORDSTROM') label = 'Nordstrom';
      else if (c === 'G' || c === 'GIFT' || c === 'PR') { label = 'Gift / PR'; kind = 'Gift'; }
      toast(`${kind} · ${label} · ${targetSku.name} ${targetSku.size}`, 'success');
      render();
    } catch(e) {
      toast('Save failed', 'error');
    }
  }

  // Shows a list of all sizes for a color, with individual Edit / Del per row
  function openGroupEditModal(groupKey) {
    const [ref, color] = groupKey.split('||');
    const skus = Object.values(state.skus).filter(s => s.reference === ref && s.color === color);
    if (!skus.length) return;

    const sizeOrder = ['XS','S','M','L','XL','XXL','XXXL'];
    skus.sort((a,b) => {
      const ai = sizeOrder.indexOf((a.size||'').trim().toUpperCase());
      const bi = sizeOrder.indexOf((b.size||'').trim().toUpperCase());
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });

    const rows = skus.map(s => {
      const totalSold = Object.values(s.soldByMonth || {}).reduce((a,b) => a + n(b), 0);
      return `
        <div class="size-row">
          <span class="size-row-size">${esc((s.size||'').trim().toUpperCase())}</span>
          <span class="size-row-upc">${esc(s.upc)}</span>
          <span class="size-row-stat">NJ: <strong>${n(s.qtyNj)}</strong></span>
          <span class="size-row-stat">Nord: <strong>${n(s.qtyNordstrom)}</strong></span>
          <span class="size-row-stat">Sold: <strong>${totalSold}</strong></span>
          <button class="size-row-edit" data-edit-sku="${s.id}">Edit</button>
          <button class="size-row-del" data-del-sku="${s.id}">×</button>
        </div>
      `;
    }).join('');

    $('editTitle').textContent = `${skus[0].name} · ${color}`;
    $('editDelete').style.visibility = 'hidden';
    $('editFields').innerHTML = `
      <p style="font-family:var(--mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px;">${esc(ref)} · ${skus.length} sizes</p>
      <div class="sizes-list">
        ${rows}
      </div>
    `;
    // Hide the Save button — this is read-only list view
    $('editBackdrop').classList.add('open');
    document.querySelector('.modal-actions').style.display = 'none';

    // Wire up per-size edit/del
    $('editFields').querySelectorAll('[data-edit-sku]').forEach(btn => {
      btn.addEventListener('click', () => {
        closeEditModal();
        openEditModal(btn.dataset.editSku);
      });
    });
    $('editFields').querySelectorAll('[data-del-sku]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const s = state.skus[btn.dataset.delSku];
        if (!s) return;
        if (!confirm(`Delete ${s.name} · ${s.color} · ${s.size}?`)) return;
        delete state.skus[btn.dataset.delSku];
        await deleteSku(btn.dataset.delSku);
        closeEditModal();
        render();
        toast('Deleted');
      });
    });
  }

  // ═══════════════════════════════════════════════
  // RECORD SALE MODAL (admin-only — for manual sale recording)
  // ═══════════════════════════════════════════════
  async function openSaleModal(skuId) {
    const sku = state.skus[skuId];
    if (!sku) return;

    // Build a custom prompt — D (DTC), N (Nordstrom), or G (Gift / PR)
    const choice = window.prompt(
      `Record for:\n\n${sku.name} · ${sku.color} · ${sku.size}\nCurrent NJ: ${n(sku.qtyNj)}\n\nType: D (DTC) · N (Nordstrom) · G (Gift / PR)`,
      'D'
    );
    if (!choice) return;
    const c = choice.trim().toUpperCase();
    const validChoices = ['D','DTC','N','NORDSTROM','G','GIFT','PR'];
    if (!validChoices.includes(c)) {
      toast('Invalid choice — type D, N, or G', 'error');
      return;
    }

    const monthKey = currentMonthKey();

    if (c === 'G' || c === 'GIFT' || c === 'PR') {
      // GIFT — tracked separately, does NOT count as a sale
      sku.giftedByMonth = { ...(sku.giftedByMonth || {}) };
      sku.giftedByMonth[monthKey] = (sku.giftedByMonth[monthKey] || 0) + 1;
    } else {
      // SALE (DTC or Nordstrom)
      sku.soldByMonth = { ...(sku.soldByMonth || {}) };
      sku.soldByMonth[monthKey] = (sku.soldByMonth[monthKey] || 0) + 1;

      if (c === 'D' || c === 'DTC') {
        sku.soldDtcByMonth = { ...(sku.soldDtcByMonth || {}) };
        sku.soldDtcByMonth[monthKey] = (sku.soldDtcByMonth[monthKey] || 0) + 1;
      } else {
        sku.soldNordstromByMonth = { ...(sku.soldNordstromByMonth || {}) };
        sku.soldNordstromByMonth[monthKey] = (sku.soldNordstromByMonth[monthKey] || 0) + 1;
      }
    }

    // Note: we do NOT touch qtyNj here. The warehouse assistant will scan
    // SHIP OUT when the unit physically leaves, which decrements NJ.

    try {
      await saveSku(sku);
      let label = 'DTC';
      let kind = 'Sale';
      if (c === 'N' || c === 'NORDSTROM') label = 'Nordstrom';
      else if (c === 'G' || c === 'GIFT' || c === 'PR') { label = 'Gift / PR'; kind = 'Gift'; }
      toast(`${kind} · ${label} · ${sku.name} ${sku.size}`, 'success');
      render();
    } catch(err) {
      toast('Save failed', 'error');
    }
  }

  // ═══════════════════════════════════════════════
  // EDIT MODAL
  // ═══════════════════════════════════════════════
  function openEditModal(id) {
    state.editingId = id || null;
    const existing = id ? state.skus[id] : null;
    $('editTitle').textContent = existing ? 'Edit SKU' : 'Add SKU';
    $('editDelete').style.visibility = existing ? 'visible' : 'hidden';
    // Make sure modal actions are visible (group edit modal hides them)
    const actions = document.querySelector('.modal-actions');
    if (actions) actions.style.display = '';

    const s = existing || {};
    $('editFields').innerHTML = `
      <div class="field-row">
        <div class="field"><label>Reference</label><input class="field-input" type="text" data-key="reference" value="${esc(s.reference||'')}"></div>
        <div class="field"><label>UPC</label><input class="field-input" type="text" data-key="upc" value="${esc(s.upc||'')}"></div>
      </div>
      <div class="field"><label>Style name</label><input class="field-input" type="text" data-key="name" value="${esc(s.name||'')}"></div>
      <div class="field-row">
        <div class="field"><label>Color / print</label><input class="field-input" type="text" data-key="color" value="${esc(s.color||'')}"></div>
        <div class="field"><label>Size</label><input class="field-input" type="text" data-key="size" value="${esc(s.size||'')}"></div>
      </div>
      <div class="field-row-3">
        <div class="field"><label>Qty NJ</label><input class="field-input" type="number" step="1" min="0" data-key="qtyNj" value="${n(s.qtyNj)||''}"></div>
        <div class="field"><label>Qty Nordstrom</label><input class="field-input" type="number" step="1" min="0" data-key="qtyNordstrom" value="${n(s.qtyNordstrom)||''}"></div>
        <div class="field"><label>Returns</label><input class="field-input" type="number" step="1" min="0" data-key="qtyReturns" value="${n(s.qtyReturns)||''}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Cost <span class="unit">· USD</span></label><input class="field-input" type="number" step="any" min="0" data-key="cost" value="${s.cost ?? ''}"></div>
        <div class="field"><label>Listing price <span class="unit">· USD</span></label><input class="field-input" type="number" step="any" min="0" data-key="listingPrice" value="${s.listingPrice ?? ''}"></div>
      </div>
      <div class="field"><label>Notes</label><textarea data-key="notes" rows="2">${esc(s.notes||'')}</textarea></div>
    `;
    $('editBackdrop').classList.add('open');
    setTimeout(() => $('editFields').querySelector('input')?.focus(), 80);
  }

  function closeEditModal() {
    $('editBackdrop').classList.remove('open');
    state.editingId = null;
    // Restore modal-actions visibility (might be hidden by group edit modal)
    const actions = document.querySelector('.modal-actions');
    if (actions) actions.style.display = '';
  }

  async function saveFromModal() {
    const data = {};
    $('editFields').querySelectorAll('[data-key]').forEach(el => {
      let v = el.value.trim();
      if (el.type === 'number') v = v === '' ? '' : parseFloat(v);
      data[el.dataset.key] = v;
    });
    if (!data.reference && !data.upc && !data.name) { toast('Need at least reference, UPC, or name', 'error'); return; }

    const existing = state.editingId ? state.skus[state.editingId] : null;
    const id = existing?.id || genId();
    const sku = {
      id,
      reference: data.reference || '',
      name: data.name || '',
      color: data.color || '',
      upc: data.upc || '',
      size: data.size || '',
      qtyNj: n(data.qtyNj),
      qtyNordstrom: n(data.qtyNordstrom),
      qtyReturns: n(data.qtyReturns),
      cost: data.cost ?? '',
      listingPrice: data.listingPrice ?? '',
      notes: data.notes || '',
      totalReceived: Number(existing?.totalReceived) || 0,
      soldByMonth: existing?.soldByMonth || {},
      soldDtcByMonth: existing?.soldDtcByMonth || {},
      soldNordstromByMonth: existing?.soldNordstromByMonth || {},
      giftedByMonth: existing?.giftedByMonth || {}
    };
    state.skus[id] = sku;
    try {
      await saveSku(sku);
      closeEditModal();
      render();
      toast(existing ? 'Updated' : 'Added', 'success');
    } catch(e) {
      toast('Save failed', 'error');
    }
  }

  async function confirmDelete(id) {
    const s = state.skus[id];
    if (!s) return;
    if (!confirm(`Delete ${s.name || s.reference} · ${s.size}?`)) return;
    delete state.skus[id];
    await deleteSku(id);
    render();
    toast('Deleted');
  }

  async function clearAll() {
    if (!confirm('Delete ALL sale inventory SKUs? This cannot be undone.')) return;
    if (!confirm('Really sure? Export backup first if you want to keep data.')) return;
    setSyncStatus('syncing', 'Clearing');
    try {
      for (const id of Object.keys(state.skus)) await deleteSku(id);
      state.skus = {};
      render();
      toast('All data cleared');
    } catch(e) { toast('Clear failed', 'error'); }
  }

  // ═══════════════════════════════════════════════
  // TOAST
  // ═══════════════════════════════════════════════
  let toastTimer;
  function toast(msg, variant) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.remove('error','success');
    if (variant === 'error') t.classList.add('error');
    if (variant === 'success') t.classList.add('success');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
  }

  // ═══════════════════════════════════════════════
  // WIRING
  // ═══════════════════════════════════════════════
  function wireEvents() {
    document.querySelectorAll('.view-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const v = tab.dataset.view;
        if (v === state.view) return;
        stopScanner();
        state.view = v;
        render();
      });
    });

    $('excelFileInput').addEventListener('change', async e => {
      const f = e.target.files[0];
      if (f) await handleExcelFile(f);
      e.target.value = '';
    });

    $('editClose').addEventListener('click', closeEditModal);
    $('editBackdrop').addEventListener('click', e => { if (e.target.id === 'editBackdrop') closeEditModal(); });
    $('editSave').addEventListener('click', saveFromModal);
    $('editDelete').addEventListener('click', async () => {
      if (!state.editingId) return;
      if (!confirm('Delete this SKU?')) return;
      delete state.skus[state.editingId];
      await deleteSku(state.editingId);
      closeEditModal();
      render();
      toast('Deleted');
    });

    const menuBtn = $('menuBtn'), menu = $('menuDropdown');
    menuBtn.addEventListener('click', e => { e.stopPropagation(); menu.classList.toggle('open'); });
    document.addEventListener('click', () => menu.classList.remove('open'));
    menu.addEventListener('click', e => {
      const a = e.target.dataset?.action; if (!a) return;
      menu.classList.remove('open');
      if (a === 'import-excel') $('excelFileInput').click();
      else if (a === 'export-excel') exportExcel();
      else if (a === 'add-sku') openEditModal(null);
      else if (a === 'clear-all') clearAll();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if ($('editBackdrop').classList.contains('open')) closeEditModal();
      }
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey) && $('editBackdrop').classList.contains('open')) saveFromModal();
    });

    // Auto-default to scan view on mobile
    if (window.matchMedia('(max-width: 640px)').matches) {
      state.view = 'scan';
    }
  }

  async function init() {
    wireEvents();
    await loadAll();
    render();
    startPolling();
  }

  init();
})();
</script>
</body>
</html>
